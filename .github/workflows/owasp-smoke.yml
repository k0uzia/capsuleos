name: owasp-smoke

on:
  workflow_dispatch:
    inputs:
      url:
        description: URL de base (ex. https://os.lacapsule.org)
        required: true
        default: https://os.lacapsule.org

jobs:
  smoke-headers:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier en-têtes sécurité HTTP
        env:
          BASE_URL: ${{ github.event.inputs.url }}
        run: |
          set -euo pipefail
          headers="$(curl -sI "${BASE_URL}/index.html")"
          echo "$headers"
          echo "$headers" | grep -qi 'strict-transport-security'
          echo "$headers" | grep -qi 'content-security-policy'
          echo "$headers" | grep -qi 'x-frame-options'
          echo "✓ En-têtes OWASP présents sur ${BASE_URL}"
