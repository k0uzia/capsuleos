<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../../../usr/share/capsuleos/assets/images/platforms/pick-os/ios/apple.svg" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css" type="text/css">
    <title>IOS - 15</title>
</head>
<body id="ios15">
    <header id="iosheader">
        <div id="headercellular">
            <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/cellular.svg" alt="Icône de réseau">
            <p>Capsule</p>
            <p>4G</p>
        </div>
        <span id="heure"></span>
        <div id="headerbattery">
            <p>100 %</p>
            <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/battery.svg" alt="Icône de batterie">
        </div>

    </header>
    <object id="desktop">
        <a target="windowElement" data-link="settings">
            <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/settings.svg" alt="Paramètres">
        </a>
    </object>
    <footer id="tableau">
        <nav>
            <a href="apps/phone/contact.html" data-link="phone">
                <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/phone.svg" alt="Téléphone">
            </a>
            <a target="windowElement" data-link="safari">
                <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/safari.svg" alt="Safari">
            </a>
            <a href="apps/message/message.html" data-link="message">
                <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/messages.svg" alt="Message">
            </a>
            <a target="windowElement" data-link="musique">
                <img src="../../../usr/share/capsuleos/assets/images/toolkits/ios/apple-music.svg" alt="Musique">
            </a>
        </nav>
    </footer>
    <script src="./js/date.js"></script>
</body>
</html>
