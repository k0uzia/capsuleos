        <div class="mint-panel__right taskbar-right">
            <div class="mint-panel__tray taskbar-tray taskbar-tray--systray" id="system-tray" aria-label="Zone de notification">
                <button type="button" class="taskbar-tray__btn sticky-applet-trigger mint-tray--idle-hidden" data-stk-applet-trigger
                        aria-expanded="false" aria-controls="mint-sticky-applet"

                    <span class="taskbar-tray__icon taskbar-tray__icon--sticky" aria-hidden="true"></span>
                </button>
                <div class="mint-tray-popover sticky-applet" id="mint-sticky-applet" role="menu" aria-label="Notes récentes" hidden>
                    <p class="sticky-applet__title">Notes récentes</p>
                    <ul class="sticky-applet__list"></ul>
                </div>
                <button type="button"

                        aria-label="Mises à jour disponibles"
                        title="Gestionnaire de mise à jour">
                    <span class="taskbar-tray__icon taskbar-tray__icon--shield" aria-hidden="true"></span>
                </button>
                <button type="button" class="taskbar-tray__btn mint-tray--vm-collapsed mint-tray--idle-hidden" id="tray-btn-xapp"
                        aria-expanded="false" aria-controls="mint-tray-popover-xapp"
                        aria-label="Applications XApp" title="Applications XApp" hidden>
                    <span class="taskbar-tray__icon taskbar-tray__icon--xapp" aria-hidden="true"></span>
                </button>
                <button type="button" class="taskbar-tray__btn mint-tray--vm-collapsed mint-tray--idle-hidden" id="tray-btn-notifications"
                        aria-expanded="false" aria-controls="mint-tray-popover-notifications"
                        aria-label="Notifications" title="Notifications" hidden>
                    <span class="taskbar-tray__icon taskbar-tray__icon--notifications" aria-hidden="true"></span>
                </button>
                <button type="button" class="taskbar-tray__btn mint-tray--vm-collapsed mint-tray--idle-hidden" id="tray-btn-printers"
                        aria-expanded="false" aria-controls="mint-tray-popover-printers"
                        aria-label="Imprimantes" title="Imprimantes" hidden>
                    <span class="taskbar-tray__icon taskbar-tray__icon--printers" aria-hidden="true"></span>
                </button>
                <button type="button" class="taskbar-tray__btn mint-tray--vm-collapsed mint-tray--idle-hidden" id="tray-btn-removable"
                        aria-expanded="false" aria-controls="mint-tray-popover-removable"
                        aria-label="Supports amovibles" title="Supports amovibles" hidden>
                    <span class="taskbar-tray__icon taskbar-tray__icon--removable" aria-hidden="true"></span>
                </button>
            </div>
            <button type="button" class="taskbar-tray__btn taskbar-tray__btn--keyboard-label mint-panel__applet mint-tray--idle-hidden" id="tray-btn-keyboard"

            <div class="mint-panel__favorites taskbar-favorites mint-tray--idle-hidden" id="mint-tray-favorites" role="group" aria-label="Applications favorites" hidden></div>
            <button type="button" class="taskbar-tray__btn mint-panel__applet" id="tray-btn-network"

            <button type="button" class="taskbar-tray__btn mint-panel__applet" id="tray-sound-btn"
