<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/style/pages.base.css">
    <script src="../apps/js/pages-shell.js"></script>
    <title>Paramètres</title>
</head>
<body>
    <div class="win-page--modern">
        <header class="win-page__header">
            <h1>Paramètres</h1>
        </header>
        <main class="win-page__body">
            <ul class="win-page__list">
                <li>Système</li>
                <li>Bluetooth et appareils</li>
                <li>Réseau et Internet</li>
                <li>Personnalisation</li>
                <li>Comptes</li>
                <li>Accessibilité</li>
            </ul>
        </main>
    </div>

    <div class="win-page--classic">
        <div class="win95-cpl" role="application" aria-label="Panneau de configuration">
            <div class="win95-cpl__titlebar">Panneau de configuration</div>
            <div class="win95-cpl__grid">
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">🖥</span><span>Affichage</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">⌨</span><span>Clavier</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">🖱</span><span>Souris</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">🔊</span><span>Sons</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">🌐</span><span>Réseau</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">➕</span><span>Ajouter du matériel</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">📦</span><span>Ajouter ou supprimer des programmes</span></button>
                <button type="button" class="win95-cpl__icon"><span class="win95-cpl__glyph" aria-hidden="true">👤</span><span>Mot de passe</span></button>
            </div>
        </div>
    </div>
</body>
</html>
