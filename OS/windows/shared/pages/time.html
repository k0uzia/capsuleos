<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../apps/style/pages.base.css">
    <title>Date et heure</title>
</head>
<body>
    <header class="win-page__header">
        <h1>Date et heure</h1>
    </header>
    <main class="win-page__body">
        <p id="win-time-display" class="win-page__hint"></p>
    </main>
    <script>
        function refresh() {
            const el = document.getElementById('win-time-display');
            if (!el) return;
            const d = new Date();
            el.textContent = d.toLocaleString('fr-FR', {
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
        }
        refresh();
        setInterval(refresh, 1000);
    </script>
</body>
</html>
