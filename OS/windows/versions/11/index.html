<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./media/img/win11.png" type="image/x-icon">
    <link rel="stylesheet" href="./style/style.css">
    <title>Windows 11</title>
</head>
<body data-win-version="11" data-win-shell="modern">
    <header></header>
    <main>
        <div id="menu"></div>
        <a href="../../shared/pages/corbeille.html" target="lien" title="Accéder à la corbeille">
            <img src="./media/img/corbeille.png" alt="Corbeille" title="Accéder à la corbeille">
        </a>
        <div id="windowContainer" class="resize-drag" style="display: none; position: fixed;">
            <div id="windowHeader">
                <span></span>
                <span id="windowTitle"></span>
                <button type="button" id="minimizeBtn" aria-label="Réduire">−</button>
                <button type="button" id="resizeBtn" aria-label="Agrandir">□</button>
                <button type="button" id="closeBtn" aria-label="Fermer">×</button>
            </div>
            <iframe id="windowIframe" src="" name="lien" title="Fenêtre application"
                sandbox="allow-same-origin allow-popups allow-scripts" loading="lazy"></iframe>
        </div>
    </main>
    <footer>
        <menu>
            <i title="Menu Démarrer" aria-label="Menu Démarrer">
                <img src="./media/img/win11.png" alt="Logo de Windows" title="Accéder au menu démarrer">
            </i>
            <a href="../../shared/pages/explorateur.html" target="lien" title="Explorateur de fichiers">
                <img src="./media/img/folder.png" alt="Explorateur de fichiers" title="Explorateur de fichiers">
            </a>
            <a href="../../shared/pages/photos.html" target="lien" title="Explorateur de photos">
                <img src="./media/img/photo.png" alt="Explorateur de photos" title="Explorateur de photos">
            </a>
            <a href="../../shared/pages/videos.html" target="lien" title="Explorateur de vidéos">
                <img src="./media/img/films.png" alt="Explorateur de vidéos" title="Explorateur de vidéos">
            </a>
        </menu>
        <a href="../../shared/pages/time.html" target="lien" title="Date et heure">
            <span id="heure-date"></span>
        </a>
    </footer>
    <script>
        window.CAPSULE_WIN_VERSION = '11';
        window.CAPSULE_WIN_SHELL = 'modern';
        window.CAPSULE_WIN_START_STYLE = 'centered';
        window.CAPSULE_WIN_APPS_BASE = '../../shared/apps';
        window.CAPSULE_WIN_PAGES_BASE = '../../shared/pages';
        window.CAPSULE_WIN_CONTENT_ROOT = '../../shared/content';
        window.CAPSULE_WIN_SKIN_BASE = '.';
        window.CAPSULE_WIN_HUB = '../../index.html';
        window.CAPSULE_WIN_SITE_HOME = '../../../../../index.html';
        window.CAPSULE_SITE_HOME = '../../../../../index.html';
        window.CAPSULE_PICK_OS = 'windows';
    </script>
    <script src="../../kernel/js/capsule-windows-embed.js"></script>
    <script src="../../kernel/js/date.js"></script>
    <script src="../../../../../js/capsule-pick-return.js"></script>
    <script src="../../../../../js/background.js"></script>
    <script src="../../../../../js/windowDrag.js"></script>
    <script src="../../../../../js/resizeWindow.js"></script>
    <script src="../../kernel/js/win-desktop.js"></script>
    <script src="../../kernel/js/windowManager.js"></script>
    <script src="./js/menu.js"></script>
    <script src="./js/demarrer.js"></script>
    <script src="../../../../../js/windows.js"></script>
</body>
</html>
