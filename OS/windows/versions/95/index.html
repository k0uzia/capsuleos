<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./media/img/computer.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./style/style.css">
    <title>Windows 95</title>
</head>
<body data-win-version="95" data-win-shell="classic">
    <header></header>
    <main>
        <div id="menu"></div>
        <a href="../../shared/pages/explorateur.html" target="lien" title="Explorateur de fichiers" class="desktop-icon">
            <img src="./media/img/folder.svg" alt="Explorateur" title="Explorateur de fichiers">
        </a>
        <a href="../../shared/pages/corbeille.html" target="lien" title="Corbeille" class="desktop-icon">
            <img src="./media/img/trash.svg" alt="Corbeille" title="Corbeille">
        </a>
        <div id="windowContainer" class="resize-drag" style="display: none; position: fixed;">
            <div id="windowHeader">
                <span></span>
                <span id="windowTitle"></span>
                <button type="button" id="minimizeBtn" aria-label="Réduire">−</button>
                <button type="button" id="resizeBtn" aria-label="Agrandir">□</button>
                <button type="button" id="closeBtn" aria-label="Fermer">×</button>
            </div>
            <iframe id="windowIframe" src="" name="lien" title="Fenêtre application"
                sandbox="allow-same-origin allow-popups allow-scripts" loading="lazy"></iframe>
        </div>
    </main>
    <footer>
        <menu>
            <i class="taskbar-start taskbar-start--classic" title="Menu Démarrer" aria-label="Menu Démarrer"></i>
            <a href="../../shared/pages/explorateur.html" target="lien" title="Explorateur" class="taskbar-icon">
                <img src="./media/img/folder.svg" alt="Explorateur" title="Explorateur">
            </a>
            <a href="../../shared/pages/settings.html" target="lien" title="Paramètres" class="taskbar-icon">
                <img src="./media/img/settings.svg" alt="Paramètres" title="Paramètres">
            </a>
        </menu>
        <a href="../../shared/pages/time.html" target="lien" title="Date et heure">
            <span id="heure-date"></span>
        </a>
    </footer>
    <script>
        window.CAPSULE_WIN_VERSION = '95';
        window.CAPSULE_WIN_SHELL = 'classic';
        window.CAPSULE_WIN_START_STYLE = 'classic';
        window.CAPSULE_WIN_APPS_BASE = '../../shared/apps';
        window.CAPSULE_WIN_PAGES_BASE = '../../shared/pages';
        window.CAPSULE_WIN_CONTENT_ROOT = '../../shared/content';
        window.CAPSULE_WIN_SKIN_BASE = '.';
        window.CAPSULE_WIN_HUB = '../../index.html';
        window.CAPSULE_WIN_SITE_HOME = '../../../../../index.html';
        window.CAPSULE_PICK_OS = 'windows';
    </script>
    <script src="../../kernel/js/capsule-windows-embed.js"></script>
    <script src="../../kernel/js/date.js"></script>
    <script src="../../../../../js/background.js"></script>
    <script src="../../../../../js/windowDrag.js"></script>
    <script src="../../../../../js/resizeWindow.js"></script>
    <script src="../../../../../js/capsule-pick-return.js"></script>
    <script src="../../kernel/js/win-desktop.js"></script>
    <script src="../../kernel/js/win-start-menu-build.js"></script>
    <script src="../../kernel/js/startMenu.js"></script>
    <script src="../../kernel/js/taskbar.js"></script>
    <script src="../../kernel/js/windowManager.js"></script>
</body>
</html>
