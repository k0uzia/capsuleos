# REUSE 3 — CapsuleOS (https://reuse.software/spec-3.0/)
version = 1
SPDX-PackageName = "CapsuleOS"
SPDX-PackageSupplier = "les contributeurs CapsuleOS <info@noref.fr>"
SPDX-PackageDownloadLocation = "https://github.com/N0r3f/CapsuleOS"

[[annotations]]
path = [
    "usr/lib/**",
    "usr/share/capsuleos/themes/**",
    "usr/share/capsuleos/linux/**",
    "home/**",
    "OS/**",
    "etc/capsuleos/**",
    "root/**",
    "var/lib/capsuleos/**",
    "index.html",
    "sw.js",
    "contrib.md",
    "README.md",
    "LICENSE.md",
    "CODE_OF_CONDUCT.md",
    "SECURITY.md",
    ".cursor/rules/**",
    "root/tools/**",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "2020-2026 les contributeurs CapsuleOS"
SPDX-License-Identifier = "GPL-3.0-or-later"

[[annotations]]
path = [
    "node_modules/**",
    "usr/share/capsuleos/assets/**",
    "LICENSE",
]
precedence = "exclude"
