    <script>
    (function () {
        function updateUbuntuDate() {
            var el = document.getElementById('elementary-clock-date');
            if (!el) return;
            var now = new Date();
            el.textContent = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
        }
        document.addEventListener('DOMContentLoaded', function () {
            updateUbuntuDate();
            setInterval(updateUbuntuDate, 60000);
        });
    })();
    </script>
    <script>
    (function () {
        function bindUbuntuHelpThemeToggle() {
            var helpBtn = document.getElementById('elementary-help-theme-btn');
            if (!helpBtn || helpBtn.dataset.bound === 'true') return;
            helpBtn.dataset.bound = 'true';

            helpBtn.addEventListener('click', function () {
                var qsThemeBtn = document.getElementById('quick-settings-theme-btn');
                if (qsThemeBtn) {
                    qsThemeBtn.click();
                    return;
                }
                var nextTheme = document.documentElement.dataset.theme === 'light' ? 'dark' : 'light';
                document.documentElement.dataset.theme = nextTheme;
                if (window.CapsuleThemeStorage && window.CapsuleThemeStorage.persistTheme) {
                    window.CapsuleThemeStorage.persistTheme(nextTheme, 'elementary');
                } else {
                    localStorage.setItem('gnome-theme', nextTheme);
                }
                var label = document.getElementById('quick-settings-theme-label');
                if (label) {
                    label.textContent = nextTheme === 'light' ? 'Style clair' : 'Style sombre';
                }
            });
        }

        document.addEventListener('DOMContentLoaded', bindUbuntuHelpThemeToggle);
    })();
    </script>
