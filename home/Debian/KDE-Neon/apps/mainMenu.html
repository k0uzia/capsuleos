<section class="menu-root menu-root--plasma" aria-label="Menu des applications">

    <header class="menu-plasma-header">
        <div class="menu-user" aria-label="Utilisateur">
            <span class="menu-user__avatar" aria-hidden="true"></span>
            <span class="menu-user__name" data-capsule-text="mainMenu.userName">goupil</span>
        </div>
        <div class="menu-search-wrap">
            <input
                type="search"
                class="menu-search"
                id="menu-search"
                data-capsule-attr="placeholder:mainMenu.searchPlaceholder,aria-label:mainMenu.searchPlaceholder"
                placeholder="Rechercher…"
                autocomplete="off"
                spellcheck="false"
                enterkeyhint="search"
            >
            <button type="button" class="menu-search-clear" id="menu-search-clear" hidden
                    data-capsule-attr="aria-label:mainMenu.searchClear" aria-label="Effacer la recherche"></button>
        </div>
        <div class="menu-plasma-chrome" aria-label="Actions du menu">
            <button type="button" class="menu-plasma-chrome__btn" id="menu-btn-filter"
                    data-capsule-attr="title:mainMenu.filterTitle,aria-label:mainMenu.filterTitle" title="Filtres" aria-label="Filtres"></button>
            <button type="button" class="menu-plasma-chrome__btn" id="menu-btn-pin"
                    data-capsule-attr="title:mainMenu.pinTitle,aria-label:mainMenu.pinTitle" title="Épingler" aria-label="Épingler"></button>
        </div>
    </header>

    <div class="menu-plasma-body">
        <aside class="menu-plasma-sidebar" aria-label="Navigation">
            <ul class="menu-cats" id="menu-cats" aria-label="Catégories"></ul>
            <ul class="menu-places" id="menu-places" aria-label="Emplacements" hidden>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="home">Dossier personnel</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="desktop">Bureau</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="documents">Documents</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="downloads">Téléchargements</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="pictures">Images</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="music">Musique</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="videos">Vidéos</a></li>
                <li><a href="#" class="menu-shortcut" data-shortcut-id="trash">Corbeille</a></li>
            </ul>
        </aside>
        <div class="menu-apps" aria-label="Applications">
            <h2 class="menu-plasma-results-heading" id="menu-results-heading" hidden
                data-capsule-text="mainMenu.searchResultsHeading">Applications</h2>
            <ul class="menu-app-list" id="menu-app-list"></ul>
        </div>
    </div>

    <footer class="menu-plasma-footer">
        <nav class="menu-plasma-tabs" aria-label="Vue du menu">
            <button type="button" class="menu-plasma-tab menu-plasma-tab--active" data-menu-tab="apps">Applications</button>
            <button type="button" class="menu-plasma-tab menu-plasma-tab--places" data-menu-tab="places">Emplacements</button>
        </nav>
        <nav class="menu-plasma-power" aria-label="Actions système">
            <button type="button" class="menu-plasma-power__btn" id="menu-btn-sleep"
                    data-capsule-attr="title:mainMenu.powerSleep" title="Veille">
                <img src="../../../../usr/share/capsuleos/assets/images/toolkits/kde/menu/plasma/system-suspend.svg" alt="">
                <span data-capsule-text="mainMenu.powerSleep">Veille</span>
            </button>
            <button type="button" class="menu-plasma-power__btn" id="menu-btn-restart"
                    data-capsule-attr="title:mainMenu.powerRestart" title="Redémarrer">
                <img src="../../../../usr/share/capsuleos/assets/images/toolkits/kde/menu/plasma/system-reboot.svg" alt="">
                <span data-capsule-text="mainMenu.powerRestart">Redémarrer</span>
            </button>
            <button type="button" class="menu-plasma-power__btn" id="menu-btn-power"
                    data-capsule-attr="title:mainMenu.powerShutdown" title="Éteindre">
                <img src="../../../../usr/share/capsuleos/assets/images/toolkits/kde/menu/plasma/system-shutdown.svg" alt="">
                <span data-capsule-text="mainMenu.powerShutdown">Éteindre</span>
            </button>
            <button type="button" class="menu-plasma-power__btn menu-plasma-power__btn--session" id="menu-btn-session"
                    data-capsule-attr="title:mainMenu.powerSession" title="Session">
                <img src="../../../../usr/share/capsuleos/assets/images/toolkits/kde/menu/plasma/system-log-out.svg" alt="">
                <span data-capsule-text="mainMenu.powerSession">Session</span>
            </button>
        </nav>
    </footer>

</section>
