<div class="kde-systemsettings kde-systemsettings--kcm" id="kdeSystemSettingsApp" data-kde-settings-root data-active-kde-panel="display-config" aria-label="Paramètres système">
    <aside class="kde-systemsettings__sidebar kde-systemsettings__sidebar--kcm" aria-label="Affichage &amp; Écran">
        <div class="kde-systemsettings__kcm-header">
            <button type="button" class="kde-systemsettings__back" aria-label="Retour"></button>
            <span class="kde-systemsettings__kcm-title">Affichage &amp; Écran</span>
        </div>
        <nav class="kde-systemsettings__nav kde-systemsettings__nav--kcm" aria-label="Sections">
            <button type="button" class="kde-systemsettings__navitem is-active" data-kde-panel="display-config" aria-current="page">
                <span>Configuration de l'affichage</span>
            </button>
            <button type="button" class="kde-systemsettings__navitem kde-systemsettings__navitem--stub" data-kde-panel="night-light" disabled aria-disabled="true">
                <span>Lumière nocturne</span>
            </button>
            <button type="button" class="kde-systemsettings__navitem kde-systemsettings__navitem--stub" data-kde-panel="screen-edges" disabled aria-disabled="true">
                <span>Bords de l'écran</span>
            </button>
        </nav>
    </aside>
    <div class="kde-systemsettings__content kde-systemsettings__content--kcm">
        <section class="kde-systemsettings__panel is-active kde-systemsettings__panel--display" data-kde-panel-content="display-config" aria-label="Configuration de l'affichage">
            <div class="kde-kscreen__monitors" role="list" aria-label="Écrans">
                <button type="button" class="kde-kscreen__monitor is-active" aria-pressed="true" aria-label="Écran principal"></button>
                <button type="button" class="kde-kscreen__monitor" aria-pressed="false" aria-label="Écran secondaire"></button>
                <button type="button" class="kde-kscreen__monitor" aria-pressed="false" aria-label="Écran dupliqué"></button>
                <button type="button" class="kde-kscreen__monitor" aria-pressed="false" aria-label="Disposition étendue"></button>
            </div>
            <div class="kde-kscreen__form">
                <label class="kde-kscreen__row">
                    <span class="kde-kscreen__label">Taux de rafraîchissement</span>
                    <span class="kde-kscreen__value-wrap">
                        <select class="kde-systemsettings__select kde-kscreen__select" aria-label="Taux de rafraîchissement">
                            <option selected>74.99 Hz</option>
                            <option>60.00 Hz</option>
                        </select>
                        <span class="kde-kscreen__info" aria-hidden="true"></span>
                    </span>
                </label>
                <label class="kde-kscreen__row">
                    <span class="kde-kscreen__label">Profil de couleurs</span>
                    <select class="kde-systemsettings__select kde-kscreen__select" aria-label="Profil de couleurs">
                        <option selected>Aucun</option>
                    </select>
                </label>
                <label class="kde-kscreen__row">
                    <span class="kde-kscreen__label">Précision des couleurs</span>
                    <select class="kde-systemsettings__select kde-kscreen__select" aria-label="Précision des couleurs">
                        <option selected>Préférez l'efficacité</option>
                    </select>
                </label>
                <div class="kde-kscreen__row kde-kscreen__row--slider">
                    <span class="kde-kscreen__label">Luminosité</span>
                    <div class="kde-kscreen__slider-wrap">
                        <input type="range" class="kde-kscreen__slider" min="0" max="100" value="100" aria-label="Luminosité">
                        <span class="kde-kscreen__percent">100 %</span>
                    </div>
                </div>
                <fieldset class="kde-kscreen__group">
                    <legend class="kde-kscreen__group-title">Anciennes applications (X11)</legend>
                    <label class="kde-kscreen__radio">
                        <input type="radio" name="kde-x11-scale" value="apps" checked>
                        <span>Appliquer la mise à l'échelle par elles même</span>
                        <span class="kde-kscreen__info" aria-hidden="true"></span>
                    </label>
                    <label class="kde-kscreen__radio">
                        <input type="radio" name="kde-x11-scale" value="system">
                        <span>Mise à l'échelle par le système</span>
                        <span class="kde-kscreen__info" aria-hidden="true"></span>
                    </label>
                </fieldset>
                <div class="kde-kscreen__row kde-kscreen__row--check">
                    <label class="kde-kscreen__check">
                        <input type="checkbox" checked>
                        <span>Cisaillement d'image</span>
                    </label>
                    <span class="kde-kscreen__sub">Autoriser dans les fenêtres en plein écran</span>
                    <span class="kde-kscreen__info" aria-hidden="true"></span>
                </div>
            </div>
        </section>
    </div>
    <footer class="kde-systemsettings__footer">
        <button type="button" class="kde-systemsettings__footer-btn" disabled>Réinitialiser</button>
        <button type="button" class="kde-systemsettings__footer-btn kde-systemsettings__footer-btn--primary" disabled>Appliquer</button>
    </footer>
</div>
