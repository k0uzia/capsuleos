        function updateAlmaDate() {
            var el = document.getElementById('alma-clock-date');
            if (!el) return;
            var now = new Date();
            el.textContent = now.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long' });
        }
        document.addEventListener('DOMContentLoaded', function () {
            updateAlmaDate();
            setInterval(updateAlmaDate, 60000);
        });
    })();
