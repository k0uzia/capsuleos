<main id="gnomeCalendarApp" class="gnome-calendar-app" aria-label="Calendrier">
    <header class="gnome-calendar-app__header">
        <nav class="gnome-calendar-app__nav" aria-label="Navigation mois">
            <button type="button" class="gnome-calendar-app__arrow" id="gnome-cal-prev" aria-label="Mois précédent">‹</button>
            <h2 class="gnome-calendar-app__month" id="gnome-cal-month"></h2>
            <button type="button" class="gnome-calendar-app__arrow" id="gnome-cal-next" aria-label="Mois suivant">›</button>
        </nav>
    </header>
    <div class="gnome-calendar-app__weekdays" id="gnome-cal-weekdays" aria-hidden="true"></div>
    <div class="gnome-calendar-app__grid" id="gnome-cal-grid" role="grid" aria-label="Jours du mois"></div>
</main>
