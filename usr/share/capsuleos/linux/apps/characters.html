<main id="gnomeCharactersApp" class="gnome-characters" aria-label="Caractères">

    <header class="gnome-characters__header">
        <input type="search" class="gnome-characters__search" placeholder="Rechercher…" aria-label="Rechercher un caractère" disabled>
    </header>

    <section class="gnome-characters__body">
        <div class="gnome-characters__preview" aria-live="polite">
            <span class="gnome-characters__glyph" aria-hidden="true">é</span>
            <span class="gnome-characters__name">e accent aigu</span>
            <span class="gnome-characters__code">U+00E9</span>
        </div>
        <div class="gnome-characters__grid" role="list" aria-label="Caractères récents">
            <button type="button" class="gnome-characters__cell gnome-characters__cell--active" aria-label="é">é</button>
            <button type="button" class="gnome-characters__cell" aria-label="€">€</button>
            <button type="button" class="gnome-characters__cell" aria-label="©">©</button>
            <button type="button" class="gnome-characters__cell" aria-label="→">→</button>
            <button type="button" class="gnome-characters__cell" aria-label="½">½</button>
            <button type="button" class="gnome-characters__cell" aria-label="…">…</button>
            <button type="button" class="gnome-characters__cell" aria-label="°">°</button>
            <button type="button" class="gnome-characters__cell" aria-label="±">±</button>
        </div>
    </section>

</main>
