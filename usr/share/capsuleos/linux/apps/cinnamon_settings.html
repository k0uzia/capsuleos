<main id="cinnamonSettingsApp" class="cs-app" aria-label="Paramètres du système">

    <header class="cs-app__top">
        <input type="search" class="cs-home__search" id="cs-search" placeholder="Rechercher dans les paramètres…" autocomplete="off" aria-label="Rechercher">
    </header>

    <section id="cs-home" class="cs-home" aria-label="Accueil des paramètres">
        <div class="cs-home__scroll" id="cs-home-scroll" aria-live="polite"></div>
    </section>

    <section id="cs-panel-view" class="cs-panel-view" hidden aria-label="Panneau de paramètres">
        <header class="cs-panel-view__header">
            <button type="button" class="cs-panel-view__back" id="cs-back" title="Retour à l'accueil" aria-label="Retour">◀</button>
            <h2 class="cs-panel-view__title" id="cs-panel-title">Général</h2>
        </header>
        <div class="cs-app__panels" id="cs-panels" aria-live="polite"></div>
    </section>

</main>
