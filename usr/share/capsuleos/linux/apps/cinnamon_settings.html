<main id="cinnamonSettingsApp" class="cs-app" aria-label="Paramètres du système">

    <aside class="cs-app__sidebar" id="cs-sidebar" aria-label="Panneaux"></aside>

    <section class="cs-app__main">
        <header class="cs-app__header">
            <input type="search" class="cs-app__search" id="cs-search" placeholder="Rechercher dans les paramètres…" autocomplete="off" aria-label="Rechercher">
            <h2 class="cs-app__panel-title" id="cs-panel-title">Général</h2>
        </header>
        <div class="cs-app__panels" id="cs-panels" aria-live="polite"></div>
    </section>

</main>
