<main id="gnomeClocksApp" class="gnome-clocks" aria-label="Horloges">
    <header class="gnome-clocks__header">
        <h2 class="gnome-clocks__title" id="gnome-clocks-title">Monde</h2>
        <button type="button" class="gnome-clocks__add" id="gnome-clocks-add" aria-label="Ajouter une ville" title="Ajouter">
            <span class="gnome-clocks__add-glyph" aria-hidden="true"></span>
        </button>
    </header>
    <div class="gnome-clocks__shell">
        <nav class="gnome-clocks__nav" role="tablist" aria-label="Vues Horloges">
            <button type="button" role="tab" class="gnome-clocks__nav-btn is-active" data-clocks-view="world" aria-selected="true" aria-controls="gnome-clocks-panel-world" id="gnome-clocks-tab-world" aria-label="Monde">
                <span class="gnome-clocks__nav-glyph gnome-clocks__nav-glyph--world" aria-hidden="true"></span>
            </button>
            <button type="button" role="tab" class="gnome-clocks__nav-btn" data-clocks-view="alarms" aria-selected="false" aria-controls="gnome-clocks-panel-alarms" id="gnome-clocks-tab-alarms" aria-label="Alarmes">
                <span class="gnome-clocks__nav-glyph gnome-clocks__nav-glyph--alarms" aria-hidden="true"></span>
            </button>
            <button type="button" role="tab" class="gnome-clocks__nav-btn" data-clocks-view="timer" aria-selected="false" aria-controls="gnome-clocks-panel-timer" id="gnome-clocks-tab-timer" aria-label="Minuteur">
                <span class="gnome-clocks__nav-glyph gnome-clocks__nav-glyph--timer" aria-hidden="true"></span>
            </button>
            <button type="button" role="tab" class="gnome-clocks__nav-btn" data-clocks-view="stopwatch" aria-selected="false" aria-controls="gnome-clocks-panel-stopwatch" id="gnome-clocks-tab-stopwatch" aria-label="Chronomètre">
                <span class="gnome-clocks__nav-glyph gnome-clocks__nav-glyph--stopwatch" aria-hidden="true"></span>
            </button>
        </nav>
        <div class="gnome-clocks__content">
            <section class="gnome-clocks__panel is-active" id="gnome-clocks-panel-world" data-clocks-panel="world" role="tabpanel" aria-labelledby="gnome-clocks-tab-world">
                <ul class="gnome-clocks__list" id="gnome-clocks-list" aria-live="polite"></ul>
            </section>
            <section class="gnome-clocks__panel gnome-clocks__panel--empty" id="gnome-clocks-panel-alarms" data-clocks-panel="alarms" role="tabpanel" aria-labelledby="gnome-clocks-tab-alarms" hidden>
                <p class="gnome-clocks__empty">Aucune alarme</p>
            </section>
            <section class="gnome-clocks__panel gnome-clocks__panel--timer" id="gnome-clocks-panel-timer" data-clocks-panel="timer" role="tabpanel" aria-labelledby="gnome-clocks-tab-timer" hidden>
                <p class="gnome-clocks__timer-face" aria-hidden="true">0:00:00</p>
                <p class="gnome-clocks__empty gnome-clocks__empty--hint">Appuyez pour démarrer</p>
            </section>
            <section class="gnome-clocks__panel gnome-clocks__panel--stopwatch" id="gnome-clocks-panel-stopwatch" data-clocks-panel="stopwatch" role="tabpanel" aria-labelledby="gnome-clocks-tab-stopwatch" hidden>
                <p class="gnome-clocks__stopwatch-face" aria-hidden="true">00:00,00</p>
                <p class="gnome-clocks__empty gnome-clocks__empty--hint">Appuyez pour démarrer</p>
            </section>
        </div>
    </div>
</main>
