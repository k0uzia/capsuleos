  <section class="capsule-browser" data-firefox-app data-firefox-gnome-root>
    <header class="capsule-browser__chrome" data-capsule-attr="aria-label:firefox.chromeAriaLabel" aria-label="Interface navigateur" data-firefox-gnome-chrome>
      <div class="capsule-browser__tabsbar firefox-tabbar" data-capsule-attr="aria-label:firefox.tabsAriaLabel" aria-label="Onglets" data-firefox-gnome-tabstrip>
        <div class="capsule-browser__tabs-list" data-browser-tabs data-firefox-gnome-tabs role="tablist"></div>
        <button type="button" class="capsule-browser__tab-add" data-browser-action="new-tab" aria-label="Nouvel onglet" data-capsule-attr="aria-label:firefox.tabNewButtonAria">+</button>
      </div>

      <div class="capsule-browser__toolbar" data-capsule-attr="aria-label:firefox.toolbarAriaLabel" aria-label="Barre de navigation" data-firefox-gnome-toolbar>
        <div class="capsule-browser__nav-actions">
          <button type="button" class="capsule-browser__btn capsule-browser__btn--icon-back" data-browser-action="back" disabled data-capsule-attr="aria-label:firefox.backAria">
            <span class="sr-only">Retour</span>
          </button>
          <button type="button" class="capsule-browser__btn capsule-browser__btn--icon-forward" data-browser-action="forward" disabled data-capsule-attr="aria-label:firefox.forwardAria">
            <span class="sr-only">Avant</span>
          </button>
          <button type="button" class="capsule-browser__btn capsule-browser__btn--icon-reload" data-browser-action="reload" data-capsule-attr="aria-label:firefox.reloadAria">
            <span class="sr-only">Recharger</span>
          </button>
        </div>

        <form class="capsule-browser__addressbar firefox-urlbar" data-browser-form>
          <label class="sr-only" for="capsule-browser-address-input" data-capsule-text="firefox.addressLabel">Adresse</label>
          <span class="capsule-browser__address-prefix" aria-hidden="true"></span>
          <input
            id="capsule-browser-address-input"
            class="capsule-browser__address-input"
            type="text"
            data-browser-address
            data-firefox-gnome-address
            data-capsule-attr="placeholder:firefox.addressPlaceholder"
            placeholder="Rechercher avec Google ou saisir une adresse"
            autocomplete="off"
            spellcheck="false"
            value=""
          >
          <button type="submit" class="capsule-browser__btn capsule-browser__btn--go" data-capsule-attr="aria-label:firefox.goAria">
            <span data-capsule-text="firefox.goButton">Aller</span>
          </button>
        </form>

        <div class="capsule-browser__toolbar-actions" data-capsule-attr="aria-label:firefox.toolbarActionsAria" aria-label="Actions navigateur">
          <button type="button" class="capsule-browser__btn capsule-browser__btn--ghost capsule-browser__btn--icon-home" data-browser-action="home" data-capsule-attr="aria-label:firefox.homeAria">
            <span class="sr-only">Accueil</span>
          </button>
          <button type="button" class="capsule-browser__btn capsule-browser__btn--ghost capsule-browser__btn--icon-library" data-browser-action="library" data-capsule-attr="aria-label:firefox.libraryAria">
            <span class="sr-only">Bibliothèque</span>
          </button>
          <button type="button" class="capsule-browser__btn capsule-browser__btn--ghost capsule-browser__btn--icon-star" data-browser-action="toggle-bookmarks" data-capsule-attr="aria-label:firefox.bookmarksStarAria" aria-pressed="false">
            <span class="sr-only">Favoris</span>
          </button>
          <button type="button" class="capsule-browser__btn capsule-browser__btn--ghost capsule-browser__btn--icon-menu firefox-appmenu-button" data-browser-action="menu" data-capsule-attr="aria-label:firefox.menuAria">
            <span class="sr-only">Menu</span>
          </button>
        </div>
      </div>

      <nav class="capsule-browser__bookmarks" data-browser-bookmarks data-firefox-gnome-bookmarks hidden data-capsule-attr="aria-label:firefox.bookmarksBarAria" aria-label="Favoris">
        <a href="#" class="capsule-browser__bookmark" data-browser-bookmark="Importés" data-browser-route="noop" data-capsule-text="firefox.bookmarkImported">Importés</a>
        <a href="#" class="capsule-browser__bookmark capsule-browser__bookmark--primary" data-browser-bookmark="La Capsule" data-browser-route="os-lacapsule" data-capsule-text="firefox.bookmarkLaCapsule">La Capsule</a>
        <a href="#" class="capsule-browser__bookmark" data-browser-bookmark="os-lacapsule" data-browser-route="os-lacapsule" data-capsule-text="firefox.bookmarkOsLaCapsule">os-lacapsule</a>
      </nav>
    </header>

    <p class="capsule-browser__status" data-browser-status role="status" aria-live="polite" hidden></p>

    <main class="capsule-browser__viewport firefox-content" data-browser-view="home">
      <section class="capsule-browser-newtab" data-browser-home data-firefox-gnome-newtab>
        <div class="capsule-browser-newtab__logo" aria-hidden="true"></div>
        <form class="capsule-browser-newtab__search" data-browser-newtab-form>
          <label class="sr-only" for="capsule-browser-newtab-input" data-capsule-text="firefox.newtabSearchLabel">Rechercher</label>
          <input
            id="capsule-browser-newtab-input"
            class="capsule-browser-newtab__search-input"
            type="search"
            data-browser-newtab-input
            data-capsule-attr="placeholder:firefox.addressPlaceholder"
            placeholder="Rechercher avec Google ou saisir une adresse"
            autocomplete="off"
            spellcheck="false"
          >
        </form>
        <nav class="capsule-browser-newtab__shortcuts" data-capsule-attr="aria-label:firefox.newtabShortcutsAria" aria-label="Raccourcis">
          <a href="#" class="capsule-browser-newtab__shortcut" data-browser-newtab-link="wikipedia" data-capsule-text="firefox.newtabShortcutWiki">Wikipédia</a>
          <a href="#" class="capsule-browser-newtab__shortcut" data-browser-newtab-link="youtube" data-capsule-text="firefox.newtabShortcutYoutube">YouTube</a>
          <a href="#" class="capsule-browser-newtab__shortcut" data-browser-newtab-link="reddit" data-capsule-text="firefox.newtabShortcutReddit">Reddit</a>
          <a href="#" class="capsule-browser-newtab__shortcut capsule-browser-newtab__shortcut--capsule" data-browser-newtab-link="os-lacapsule" data-capsule-text="firefox.newtabShortcutCapsule">La Capsule</a>
        </nav>
      </section>

      <section class="capsule-browser-redirect" data-browser-redirect hidden>
        <iframe
          class="capsule-browser-redirect__frame"
          data-browser-redirect-frame
          data-capsule-attr="title:firefox.iframeOsLaCapsuleTitle"
          title="os-lacapsule"
          loading="lazy"
          referrerpolicy="no-referrer"
        ></iframe>
      </section>

      <section class="capsule-browser-site" data-browser-site hidden>
        <article class="capsule-browser-site__page" data-browser-site-page="linuxmint">
          <h1 class="capsule-browser-site__title" data-capsule-text="firefox.siteLinuxMintTitle">Linux Mint</h1>
          <p class="capsule-browser-site__lead" data-capsule-text="firefox.siteLinuxMintLead">From freedom came elegance — linuxmint.com</p>
        </article>
      </section>
    </main>
  </section>
