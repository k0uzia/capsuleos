<main id="fontViewerApp" class="fnv-app" aria-label="Polices">

    <header class="fnv-app__header">
        <h1 class="fnv-app__title">Polices</h1>
    </header>

    <div class="fnv-app__body">
        <aside class="fnv-app__list" aria-label="Liste des polices">
            <ul id="fnv-font-list" class="fnv-app__fonts">
                <li class="fnv-app__font is-selected" data-font-id="ubuntu">Ubuntu Regular</li>
                <li class="fnv-app__font" data-font-id="noto">Noto Sans Regular</li>
                <li class="fnv-app__font" data-font-id="liberation">Liberation Sans Regular</li>
            </ul>
        </aside>
        <section class="fnv-app__preview" aria-label="Aperçu">
            <p class="fnv-app__sample" id="fnv-sample">Portez ce vieux whisky au juge blond qui fume.</p>
            <p class="fnv-app__meta" id="fnv-meta">Ubuntu · 12 pt</p>
        </section>
    </div>

</main>
