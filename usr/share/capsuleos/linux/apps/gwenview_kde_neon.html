<main id="gwenviewApp" class="kde-gwenview" aria-label="Gwenview">
    <header class="kde-gwenview__toolbar" aria-label="Barre d'outils">
        <button type="button" class="kde-gwenview__tool" data-gwenview-action="prev" title="Image précédente" disabled>‹</button>
        <button type="button" class="kde-gwenview__tool" data-gwenview-action="next" title="Image suivante" disabled>›</button>
        <p class="kde-gwenview__filename" id="gwenview-filename">Aucune image sélectionnée</p>
        <span class="kde-gwenview__spacer" aria-hidden="true"></span>
        <span class="kde-gwenview__zoom" id="gwenview-zoom">100 %</span>
        <button type="button" class="kde-gwenview__tool" data-gwenview-action="zoom-out" title="Zoom arrière">−</button>
        <button type="button" class="kde-gwenview__tool" data-gwenview-action="zoom-in" title="Zoom avant">+</button>
        <button type="button" class="kde-gwenview__tool" data-gwenview-action="slideshow" title="Diaporama" disabled>Diaporama</button>
    </header>
    <section class="kde-gwenview__content" id="gwenview-content" aria-label="Image">
        <p class="kde-gwenview__empty">Ouvrez une image depuis Dolphin pour l'afficher ici.</p>
    </section>
</main>
