<main id="mateColorSelectApp" class="mcs-app" aria-label="Sélecteur de couleur">

    <header class="mcs-app__header">
        <h1 class="mcs-app__title">Sélecteur de couleur</h1>
    </header>

    <div class="mcs-app__body">
        <div class="mcs-app__swatches" id="mcs-swatches" role="list" aria-label="Couleurs"></div>
        <div class="mcs-app__preview-wrap">
            <span class="mcs-app__preview" id="mcs-preview" aria-hidden="true"></span>
            <p class="mcs-app__hex" id="mcs-hex">#3584e4</p>
        </div>
        <button type="button" class="mcs-app__btn mcs-app__btn--primary" data-mcs-action="apply">Appliquer</button>
    </div>

</main>
