<main id="mintInstallApp" class="mi-app" aria-label="Logithèque">

    <header class="mi-app__header" aria-label="Recherche">
        <div class="mi-app__search-wrap">
            <span class="mi-app__search-icon" aria-hidden="true"></span>
            <label class="sr-only" for="mi-search">Rechercher des applications</label>
            <input type="search" class="mi-app__search" id="mi-search" placeholder="Rechercher des applications…" autocomplete="off">
        </div>
        <button type="button" class="mi-app__menu-btn" data-mi-action="menu" aria-label="Menu" aria-haspopup="menu" aria-expanded="false">
            <span class="mi-app__menu-icon" aria-hidden="true"></span>
        </button>
    </header>

    <div class="mi-app__body">
        <nav class="mi-app__sidebar" aria-label="Catégories">
            <button type="button" class="mi-app__cat is-active" data-mi-cat="home">Accueil</button>
            <button type="button" class="mi-app__cat" data-mi-cat="all">Tous les logiciels</button>
            <button type="button" class="mi-app__cat" data-mi-cat="flatpak">Flatpak</button>
            <span class="mi-app__sidebar-sep" role="separator"></span>
            <button type="button" class="mi-app__cat" data-mi-cat="internet">Internet</button>
            <button type="button" class="mi-app__cat" data-mi-cat="office">Bureautique</button>
            <button type="button" class="mi-app__cat" data-mi-cat="graphics">Graphisme</button>
            <button type="button" class="mi-app__cat" data-mi-cat="games">Jeux</button>
            <button type="button" class="mi-app__cat" data-mi-cat="multimedia">Multimédia</button>
            <button type="button" class="mi-app__cat" data-mi-cat="education">Éducation</button>
            <button type="button" class="mi-app__cat" data-mi-cat="accessories">Accessoires</button>
            <button type="button" class="mi-app__cat" data-mi-cat="installed">Installés</button>
        </nav>

        <section class="mi-app__content" aria-label="Applications">
            <div class="mi-app__page" data-mi-page="home">
                <h2 class="mi-app__section-title">Applications en vedette</h2>
                <ul class="mi-app__grid" id="mi-featured-grid">
                    <li class="mi-app__tile" data-mi-pkg="vlc">
                        <img class="mi-app__tile-icon" src="./assets/images/toolkits/cinnamon/apps/vlc.svg" alt="">
                        <div class="mi-app__tile-body">
                            <p class="mi-app__tile-name">VLC</p>
                            <p class="mi-app__tile-desc">Lecteur multimédia</p>
                        </div>
                        <button type="button" class="mi-app__install" data-mi-install="vlc">Installer</button>
                    </li>
                    <li class="mi-app__tile" data-mi-pkg="audacity">
                        <img class="mi-app__tile-icon" src="./assets/images/toolkits/cinnamon/apps/audacity.svg" alt="">
                        <div class="mi-app__tile-body">
                            <p class="mi-app__tile-name">Audacity</p>
                            <p class="mi-app__tile-desc">Éditeur audio</p>
                        </div>
                        <button type="button" class="mi-app__install" data-mi-install="audacity">Installer</button>
                    </li>
                    <li class="mi-app__tile" data-mi-pkg="filezilla">
                        <img class="mi-app__tile-icon" src="./assets/images/toolkits/cinnamon/apps/filezilla.svg" alt="">
                        <div class="mi-app__tile-body">
                            <p class="mi-app__tile-name">FileZilla</p>
                            <p class="mi-app__tile-desc">Client FTP</p>
                        </div>
                        <button type="button" class="mi-app__install" data-mi-install="filezilla">Installer</button>
                    </li>
                    <li class="mi-app__tile" data-mi-pkg="code">
                        <img class="mi-app__tile-icon" src="./assets/images/toolkits/cinnamon/apps/com.visualstudio.code.svg" alt="">
                        <div class="mi-app__tile-body">
                            <p class="mi-app__tile-name">Visual Studio Code</p>
                            <p class="mi-app__tile-desc">Éditeur de code</p>
                        </div>
                        <button type="button" class="mi-app__install" data-mi-install="code">Installer</button>
                    </li>
                </ul>
            </div>

            <div class="mi-app__page" data-mi-page="list" hidden>
                <h2 class="mi-app__section-title" id="mi-list-title">Tous les logiciels</h2>
                <ul class="mi-app__list" id="mi-app-list"></ul>
            </div>

            <div class="mi-app__page" data-mi-page="search" hidden>
                <h2 class="mi-app__section-title" id="mi-search-title">Résultats</h2>
                <ul class="mi-app__list" id="mi-search-list"></ul>
                <p class="mi-app__empty" id="mi-search-empty" hidden>Aucun résultat</p>
            </div>
        </section>
    </div>

    <div class="mi-app__menu" id="mi-menu" role="menu" hidden>
        <button type="button" class="mi-app__menu-item" role="menuitem" data-mi-menu="refresh">Actualiser</button>
        <button type="button" class="mi-app__menu-item" role="menuitem" data-mi-menu="prefs">Préférences</button>
        <span class="mi-app__menu-sep" role="separator"></span>
        <button type="button" class="mi-app__menu-item" role="menuitem" data-mi-menu="about">À propos</button>
    </div>

    <p class="mi-app__status sr-only" id="mi-status" role="status" aria-live="polite"></p>

</main>
