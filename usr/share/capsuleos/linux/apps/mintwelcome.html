<main id="mintwelcomeApp" class="mwc-app" aria-label="Écran d'accueil Mint">

    <div class="mwc-app__hero">
        <img class="mwc-app__logo" src="./assets/images/vendors/mint/logo.svg" alt="">
        <h1 class="mwc-app__title">Bienvenue dans Linux Mint 22.3</h1>
        <p class="mwc-app__subtitle">Codename « Zena » — Cinnamon 6.6</p>
    </div>

    <ul class="mwc-app__cards">
        <li class="mwc-app__card">
            <h2 class="mwc-app__card-title">Premiers pas</h2>
            <p class="mwc-app__card-text">Découvrez le menu, Nemo et les paramètres système.</p>
            <button type="button" class="mwc-app__btn" data-mwc-action="tour">Visite guidée</button>
        </li>
        <li class="mwc-app__card">
            <h2 class="mwc-app__card-title">Mises à jour</h2>
            <p class="mwc-app__card-text">Vérifiez que votre système est à jour.</p>
            <button type="button" class="mwc-app__btn" data-mwc-action="updates">Gestionnaire de mises à jour</button>
        </li>
        <li class="mwc-app__card">
            <h2 class="mwc-app__card-title">Drivers</h2>
            <p class="mwc-app__card-text">Installez les pilotes recommandés pour votre matériel.</p>
            <button type="button" class="mwc-app__btn" data-mwc-action="drivers">Gestionnaire de pilotes</button>
        </li>
    </ul>

    <footer class="mwc-app__footer">
        <label class="mwc-app__checkbox">
            <input type="checkbox" id="mwc-show-startup" checked>
            Afficher au démarrage
        </label>
        <button type="button" class="mwc-app__btn mwc-app__btn--primary" data-mwc-action="close">Fermer</button>
    </footer>

</main>
