<main id="okularApp" class="kde-okular" aria-label="Okular">
    <header class="kde-okular__toolbar" aria-label="Barre d'outils">
        <button type="button" class="kde-okular__tool" data-okular-action="sidebar" aria-pressed="true" title="Miniatures">Miniatures</button>
        <p class="kde-okular__filename" id="okular-filename">Aucun document sélectionné</p>
        <span class="kde-okular__spacer" aria-hidden="true"></span>
        <span class="kde-okular__page" id="okular-page">Page 1 sur 1</span>
        <span class="kde-okular__zoom" id="okular-zoom">100 %</span>
        <button type="button" class="kde-okular__tool" data-okular-action="zoom-out" title="Zoom arrière">−</button>
        <button type="button" class="kde-okular__tool" data-okular-action="zoom-in" title="Zoom avant">+</button>
    </header>
    <div class="kde-okular__body">
        <aside class="kde-okular__sidebar" id="okular-sidebar" aria-label="Miniatures">
            <p class="kde-okular__thumb is-active" aria-current="page">1</p>
        </aside>
        <section class="kde-okular__content" id="okular-content" aria-label="Document">
            <p class="kde-okular__empty">Ouvrez un fichier PDF depuis Dolphin pour l'afficher ici.</p>
        </section>
    </div>
</main>
