<main id="powerStatsApp" class="pwr-app" aria-label="Statistiques d'alimentation">

    <header class="pwr-app__header">
        <h1 class="pwr-app__title">Statistiques d'alimentation</h1>
    </header>

    <div class="pwr-app__body">
        <section class="pwr-app__chart" aria-label="Historique consommation">
            <div class="pwr-app__bars">
                <span class="pwr-app__bar" style="height:42%"></span>
                <span class="pwr-app__bar" style="height:55%"></span>
                <span class="pwr-app__bar" style="height:38%"></span>
                <span class="pwr-app__bar" style="height:62%"></span>
                <span class="pwr-app__bar" style="height:48%"></span>
            </div>
            <p class="pwr-app__legend">Consommation estimée — dernières 24 h</p>
        </section>
        <dl class="pwr-app__stats">
            <div><dt>Énergie totale</dt><dd>18,4 Wh</dd></div>
            <div><dt>Puissance moyenne</dt><dd>12,2 W</dd></div>
            <div><dt>État batterie</dt><dd>Branché — 87 %</dd></div>
        </dl>
    </div>

</main>
