<main id="rhythmboxApp" class="mint-app rb-app" data-rb-gnome-root aria-label="Rhythmbox">
    <header class="mint-app__header"><h1 class="mint-app__title">Rhythmbox</h1></header>
    <div class="rb-app__body">
        <aside class="rb-app__sidebar" data-rb-gnome-sidebar>
            <button type="button" class="rb-app__nav is-active" data-rb-gnome-nav="library">Bibliothèque musicale</button>
            <button type="button" class="rb-app__nav" data-rb-gnome-nav="podcasts">Podcasts</button>
        </aside>
        <section class="rb-app__main" data-rb-gnome-main>
            <ul class="rb-app__tracks" id="rb-tracks" data-rb-gnome-tracks>
                <li class="rb-app__track is-selected" data-rb-gnome-track="linux-mint-theme"><span>Linux Mint Theme</span><span>Artiste inconnu</span></li>
                <li class="rb-app__track" data-rb-gnome-track="capsule-lab-mix"><span>Capsule Lab Mix</span><span>CapsuleOS</span></li>
            </ul>
            <footer class="rb-app__transport" data-rb-gnome-transport>
                <button type="button" class="rb-app__play" data-rb-gnome-action="play-pause" aria-label="Lecture / pause" title="Lecture / pause"></button>
                <span class="rb-app__now" data-rb-gnome-now>En pause — Linux Mint Theme</span>
            </footer>
        </section>
    </div>
</main>
