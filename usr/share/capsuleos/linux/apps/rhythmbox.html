<main id="rhythmboxApp" class="mint-app rb-app" aria-label="Rhythmbox">
    <header class="mint-app__header"><h1 class="mint-app__title">Rhythmbox</h1></header>
    <div class="rb-app__body">
        <aside class="rb-app__sidebar"><button type="button" class="rb-app__nav is-active">Bibliothèque musicale</button><button type="button" class="rb-app__nav">Podcasts</button></aside>
        <section class="rb-app__main">
            <ul class="rb-app__tracks" id="rb-tracks">
                <li class="rb-app__track is-selected"><span>Linux Mint Theme</span><span>Artiste inconnu</span></li>
                <li class="rb-app__track"><span>Capsule Lab Mix</span><span>CapsuleOS</span></li>
            </ul>
            <footer class="rb-app__now">En pause — Linux Mint Theme</footer>
        </section>
    </div>
</main>
