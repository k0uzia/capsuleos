<main id="simpleScanApp" class="mint-app scn-app" aria-label="Numérisation de documents">
    <header class="mint-app__header"><h1 class="mint-app__title">Numérisation de documents</h1></header>
    <div class="scn-app__body">
        <div class="scn-app__preview" id="scn-preview"><p>Aucun document numérisé</p></div>
        <div class="scn-app__actions">
            <button type="button" class="scn-app__btn scn-app__btn--primary" data-scn-action="scan">Numériser</button>
            <button type="button" class="scn-app__btn" data-scn-action="save" disabled>Enregistrer sous…</button>
        </div>
    </div>
</main>
