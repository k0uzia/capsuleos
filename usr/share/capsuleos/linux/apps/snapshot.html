<main id="gnomeSnapshotApp" class="gnome-snapshot" aria-label="Snapshot">

    <header class="gnome-snapshot__header">
        <span class="gnome-snapshot__title">Snapshot</span>
    </header>

    <section class="gnome-snapshot__stage" aria-label="Aperçu caméra">
        <div class="gnome-snapshot__viewport" role="img" aria-label="Aucun flux caméra simulé"></div>
        <p class="gnome-snapshot__hint">Caméra non connectée dans CapsuleOS.</p>
    </section>

    <footer class="gnome-snapshot__controls" aria-label="Contrôles">
        <button type="button" class="gnome-snapshot__shutter" disabled aria-label="Prendre une photo"></button>
    </footer>

</main>
