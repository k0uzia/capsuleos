<main id="stickyApp" class="stk-app" aria-label="Notes">

    <header class="stk-app__toolbar">
        <button type="button" class="stk-app__btn" data-stk-action="new" aria-label="Nouvelle note">+</button>
        <button type="button" class="stk-app__btn" data-stk-action="delete" aria-label="Supprimer">🗑</button>
        <span class="stk-app__toolbar-title">Notes</span>
    </header>

    <div class="stk-app__body">
        <ul class="stk-app__list" id="stk-list" aria-label="Liste des notes">
            <li class="stk-app__item is-active" data-stk-id="1">
                <span class="stk-app__item-title">Liste de courses</span>
            </li>
            <li class="stk-app__item" data-stk-id="2">
                <span class="stk-app__item-title">Idées Mint</span>
            </li>
        </ul>
        <textarea class="stk-app__editor" id="stk-editor" aria-label="Contenu de la note">Lait
Pain
Café</textarea>
    </div>

</main>
