<main id="systemMonitorApp" class="gsm-app" aria-label="Moniteur système">

    <header class="gnome-sysmon__header gsm-app__menubar" aria-label="Menu">
        <button type="button" class="gsm-app__menu" data-gsm-menu="file">Fichier</button>
        <button type="button" class="gsm-app__menu" data-gsm-menu="edit">Édition</button>
        <button type="button" class="gsm-app__menu" data-gsm-menu="view">Affichage</button>
        <button type="button" class="gsm-app__menu" data-gsm-menu="help">Aide</button>
    </header>

    <div class="gsm-app__toolbar" aria-label="Actions">
        <button type="button" class="gsm-app__tool" data-gsm-action="search" title="Rechercher des processus" aria-label="Rechercher">
            <span class="gsm-app__tool-icon gsm-app__tool-icon--search" aria-hidden="true"></span>
        </button>
        <button type="button" class="gsm-app__tool" data-gsm-action="stop" title="Terminer le processus" aria-label="Terminer" disabled>
            <span class="gsm-app__tool-icon gsm-app__tool-icon--stop" aria-hidden="true"></span>
        </button>
        <button type="button" class="gsm-app__tool" data-gsm-action="kill" title="Forcer à quitter" aria-label="Forcer à quitter" disabled>
            <span class="gsm-app__tool-icon gsm-app__tool-icon--kill" aria-hidden="true"></span>
        </button>
    </div>

    <div class="gsm-app__tabs" role="tablist" aria-label="Vues">
        <button type="button" class="gsm-app__tab is-active" role="tab" aria-selected="true" data-gsm-tab="processes">Processus</button>
        <button type="button" class="gsm-app__tab" role="tab" aria-selected="false" data-gsm-tab="resources">Ressources</button>
        <button type="button" class="gsm-app__tab" role="tab" aria-selected="false" data-gsm-tab="filesystems">Système de fichiers</button>
    </div>

    <section class="gsm-app__panel" data-gsm-panel="processes" aria-label="Processus">
        <div class="gsm-app__search-row" id="gsm-search-row" hidden>
            <input type="search" class="gsm-app__search" id="gsm-search" placeholder="Rechercher des processus…" autocomplete="off">
        </div>
        <div class="gsm-app__table-wrap">
            <table class="gsm-app__table" aria-label="Liste des processus">
                <thead>
                    <tr>
                        <th scope="col">Nom du processus</th>
                        <th scope="col">Utilisateur</th>
                        <th scope="col">% CPU</th>
                        <th scope="col">ID du processus</th>
                        <th scope="col">Mémoire</th>
                        <th scope="col">Disque lecture</th>
                        <th scope="col">Disque écriture</th>
                        <th scope="col">Priorité de Nice</th>
                    </tr>
                </thead>
                <tbody id="gsm-process-body"></tbody>
            </table>
        </div>
    </section>

    <section class="gsm-app__panel" data-gsm-panel="resources" hidden aria-label="Ressources">
        <div class="gsm-app__resources">
            <div class="gsm-app__chart gsm-app__chart--cpu">
                <h3 class="gsm-app__chart-title">Processeurs (1)</h3>
                <div class="gsm-app__chart-area" id="gsm-cpu-chart"></div>
            </div>
            <div class="gsm-app__chart gsm-app__chart--mem">
                <h3 class="gsm-app__chart-title">Mémoire et échange</h3>
                <div class="gsm-app__chart-area gsm-app__chart-area--mem">
                    <div class="gsm-app__mem-bar"><span>Mémoire</span><span id="gsm-mem-used">2,1 Go (27 %)</span></div>
                    <div class="gsm-app__mem-bar"><span>Échange</span><span id="gsm-swap-used">0 o (0 %)</span></div>
                </div>
            </div>
            <div class="gsm-app__chart gsm-app__chart--net">
                <h3 class="gsm-app__chart-title">Réseau</h3>
                <div class="gsm-app__chart-area" id="gsm-net-chart"></div>
            </div>
        </div>
    </section>

    <section class="gsm-app__panel" data-gsm-panel="filesystems" hidden aria-label="Système de fichiers">
        <table class="gsm-app__table gsm-app__table--fs" aria-label="Systèmes de fichiers">
            <thead>
                <tr>
                    <th scope="col">Système de fichiers</th>
                    <th scope="col">Répertoire</th>
                    <th scope="col">Type</th>
                    <th scope="col">Total</th>
                    <th scope="col">Disponible</th>
                    <th scope="col">Utilisé</th>
                </tr>
            </thead>
            <tbody id="gsm-fs-body"></tbody>
        </table>
    </section>

</main>
