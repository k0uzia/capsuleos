<div class="kde-systemsettings" id="kdeSystemSettingsApp" data-kde-settings-root>
    <nav class="kde-systemsettings__nav" aria-label="Paramètres KDE">
        <button type="button" class="kde-systemsettings__navitem is-active" data-kde-panel="appearance">Apparence</button>
        <button type="button" class="kde-systemsettings__navitem" data-kde-panel="accessibility">Accessibilité</button>
    </nav>
    <div class="kde-systemsettings__panel" data-kde-panel-content="appearance">
        <h1>Apparence</h1>
        <p class="kde-systemsettings__help">Squelette System Settings — pilote linux-kde-neon.</p>
    </div>
    <div class="kde-systemsettings__panel" data-kde-panel-content="accessibility" hidden>
        <h1>Accessibilité</h1>
        <div class="adw-row adw-row--switch">
            <span class="adw-row__title">Contraste élevé</span>
            <button type="button" class="adw-switch" data-settings-switch="kde-a11y-contrast" data-kde-setting="kde-a11y-high-contrast" role="switch" aria-checked="false"></button>
        </div>
        <div class="adw-row adw-row--switch">
            <span class="adw-row__title">Texte agrandi</span>
            <button type="button" class="adw-switch" data-settings-switch="kde-a11y-text" data-kde-setting="kde-a11y-large-text" role="switch" aria-checked="false"></button>
        </div>
    </div>
</div>
