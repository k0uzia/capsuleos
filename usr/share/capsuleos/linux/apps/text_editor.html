<main id="textEditorApp" class="text-editor-app" aria-label="Éditeur de texte">

    <header class="text-editor-app__toolbar" aria-label="Barre d'outils">
        <button type="button" class="text-editor-app__btn" disabled aria-disabled="true">Nouveau</button>
        <button type="button" class="text-editor-app__btn" disabled aria-disabled="true">Ouvrir</button>
        <button type="button" class="text-editor-app__btn" disabled aria-disabled="true">Enregistrer</button>
    </header>

    <textarea
        class="text-editor-app__area"
        id="text-editor-area"
        data-capsule-attr="placeholder:text_editor.placeholder"
        placeholder="Saisissez votre texte…"
        spellcheck="true"
        aria-label="Zone de saisie"
    ></textarea>

</main>
