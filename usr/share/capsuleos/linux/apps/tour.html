<main id="gnomeTourApp" class="gnome-tour" aria-label="Visite guidée GNOME">

    <header class="gnome-tour__header">
        <h2 class="gnome-tour__title">Bienvenue dans GNOME</h2>
    </header>

    <section class="gnome-tour__stage" aria-label="Présentation">
        <div class="gnome-tour__illus" role="img" aria-label="Bureau GNOME"></div>
        <p class="gnome-tour__lead">Découvrez les raccourcis essentiels de Rocky Linux 10.</p>
        <ul class="gnome-tour__bullets">
            <li>Super — ouvrir l’Aperçu et rechercher des applications</li>
            <li>Alt+Tab — changer de fenêtre</li>
            <li>Paramètres rapides — volume, réseau, thème</li>
        </ul>
    </section>

    <footer class="gnome-tour__footer">
        <div class="gnome-tour__dots" aria-hidden="true">
            <span class="gnome-tour__dot gnome-tour__dot--active"></span>
            <span class="gnome-tour__dot"></span>
            <span class="gnome-tour__dot"></span>
        </div>
        <button type="button" class="gnome-tour__next" disabled>Suivant</button>
    </footer>

</main>
